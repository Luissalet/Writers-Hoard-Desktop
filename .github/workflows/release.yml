name: Release Desktop

# Build and publish the Windows installer to GitHub Releases when a version
# tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Can also be triggered manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch yt-dlp binary
        run: npm run fetch:bin

      - name: Build and publish installer
        run: npm run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
